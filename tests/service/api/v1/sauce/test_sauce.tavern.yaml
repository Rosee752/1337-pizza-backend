test_name: Sauce Stock Logic and CRUD Coverage

includes:
  - !include ../../../common.yaml

stages:
  # --- PART 1: STOCK LOGIC (Required for Feature) ---
  - name: Create a Sauce for Stock Test
    request:
      url: "{host}/api/v1/sauces"
      method: POST
      json:
        name: "Stock Logic Sauce"
        description: "Testing stock behavior"
        price: 0.50
        spiciness: "mild"
        stock: 1
    response:
      status_code: 201
      save:
        json:
          stock_sauce_id: id

  - name: Create Pizza Type (Linked to Sauce)
    request:
      url: "{host}/api/v1/pizza_types"
      method: POST
      json:
        name: "Stock Pizza"
        price: 10.0
        description: "desc"
        dough_id: "{dough_id}"
        sauce_id: "{stock_sauce_id}"
    response:
      status_code: 201
      save:
        json:
          pizza_type_id: id

  - name: Create Order
    request:
      url: "{host}/api/v1/orders"
      method: POST
      json:
        user_id: "{user_id}"
        address:
           street: "Test St"
           zip_code: "12345"
           city: "Test City"
    response:
      status_code: 201
      save:
        json:
          order_id: id

  - name: Add Pizza (Stock reduces 1 -> 0)
    request:
      url: "{host}/api/v1/orders/{order_id}/pizzas"
      method: POST
      json:
        pizza_type_id: "{pizza_type_id}"
        quantity: 1
    response:
      status_code: 200

  - name: Try Add Pizza Again (Stock 0 -> Fail)
    request:
      url: "{host}/api/v1/orders/{order_id}/pizzas"
      method: POST
      json:
        pizza_type_id: "{pizza_type_id}"
        quantity: 1
    response:
      status_code: 409

  - name: Delete Order (Stock restores 0 -> 1)
    request:
      url: "{host}/api/v1/orders/{order_id}"
      method: DELETE
    response:
      status_code: 204

  # --- PART 2: CRUD COVERAGE (Required for SonarQube) ---

  - name: Read - Get sauce with id
    request:
      url: "{host}/api/v1/sauces/{stock_sauce_id}"
      method: GET
    response:
      status_code: 200
      json:
        id: "{stock_sauce_id}"
        stock: 1

  - name: Read - Get a list of sauces (Covers get_all)
    request:
      url: "{host}/api/v1/sauces"
      method: GET
    response:
      status_code: 200

  - name: Update - Modify sauce (Covers update)
    request:
      url: "{host}/api/v1/sauces/{stock_sauce_id}"
      method: PUT
      json:
        name: "Updated Name"
        price: 3.50
        spiciness: "hot"
        stock: 50
        description: "Updated desc"
    response:
      status_code: 204

  - name: Edge Update - Update with non-existing ID
    request:
      # Fixed your typo here: changed 'beverages' to 'sauces'
      url: "{host}/api/v1/sauces/00000000-0000-0000-0000-000000000000"
      method: PUT
      json:
        name: "Ghost Sauce"
        price: 1.0
        spiciness: "mild"
        stock: 1
        description: "desc"
    response:
      status_code: 404

  - name: Delete - Delete sauce (Covers delete)
    request:
      url: "{host}/api/v1/sauces/{stock_sauce_id}"
      method: DELETE
    response:
      status_code: 204

  - name: Edge Delete - Delete non-existing ID
    request:
      url: "{host}/api/v1/sauces/00000000-0000-0000-0000-000000000000"
      method: DELETE
    response:
      status_code: 404