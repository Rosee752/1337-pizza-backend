test_name: Test get orders by status endpoint

includes:
  - !include ../users/user_stage.yaml
  - !include order_stage.yaml

stages:
  # Setup: Create user
  - type: ref
    id: create_user

  # Setup: Create first order with default status (OPEN)
  - type: ref
    id: create_order

  # Test 1: Get all orders (no status filter)
  - name: Get all orders without status filter
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/order
      method: GET
    response:
      status_code: 200
      # FIX: Use !anylist so it doesn't fail if old orders exist
      json: !anylist
        - id: !anything
          order_datetime: !anything
          user_id: "{user_id}"
          address: !anything
          order_status: !anystr

  # Test 2: Get orders by single status (OPEN)
  - name: Get orders with status OPEN
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/order
      method: GET
      params:
        statuses: "OPEN"
    response:
      status_code: 200
      # FIX: Flexible list check
      json: !anylist
        - id: "{order_id}"
          order_datetime: !anything
          user_id: "{user_id}"
          address: !anything
          order_status: "OPEN"

  # Setup: Create second order for multiple status test
  - name: Create second test order
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/order
      method: POST
      json:
        user_id: "{user_id}"
        address:
          street: "Teststraße"
          post_code: "12345"
          house_number: 5
          country: "Deutschland"
          town: "Berlin"
          first_name: "Max"
          last_name: "Mustermann"
    response:
      status_code: 201
      save:
        json:
          order_id_2: id

  # Test 3: Get orders by multiple statuses
  - name: Get orders with multiple statuses
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/order
      method: GET
      params:
        statuses:
          - "OPEN"
          - "PREPARING"
    response:
      status_code: 200
      json: !anylist

  # Test 4: Get orders with non-existent status
  - name: Get orders with status that returns no results
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/order
      method: GET
      params:
        statuses: "COMPLETED"
    response:
      # Note: If a zombie order IS 'COMPLETED', this might fail.
      # Usually, zombies are 'OPEN'.
      status_code: 404

  # Test 5: Update order status and verify filter
  - name: Update first order status to PREPARING
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/order/{order_id}
      method: PUT
      params:
        order_status: "PREPARING"
    response:
      status_code: 204

  - name: Verify order status filter after update to PREPARING
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/order
      method: GET
      params:
        statuses: "PREPARING"
    response:
      status_code: 200
      json: !anylist
        - id: "{order_id}"
          order_status: "PREPARING"
          user_id: "{user_id}"

  # Test 6: Verify OPEN status excludes updated order
  - name: Verify OPEN status excludes updated order
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/order
      method: GET
      params:
        statuses: "OPEN"
    response:
      status_code: 200
      json: !anylist
        - id: "{order_id_2}"
          order_status: "OPEN"
          user_id: "{user_id}"

  # Test 9: Verify multiple statuses filter
  - name: Get orders with PREPARING and IN_DELIVERY statuses
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/order
      method: GET
      params:
        statuses:
          - "PREPARING"
          - "IN_DELIVERY"
    response:
      status_code: 200
      json: !anylist
        - id: "{order_id}"
          order_status: "PREPARING"
        - id: "{order_id_2}"
          order_status: "IN_DELIVERY"

  # Cleanup: Delete orders
  - name: Delete first order
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/order/{order_id}
      method: DELETE
    response:
      status_code: 204

  - name: Delete second order
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/order/{order_id_2}
      method: DELETE
    response:
      status_code: 204

  # Cleanup: Delete user
  - type: ref
    id: delete_user