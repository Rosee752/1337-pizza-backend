test_name: Make sure that orders can be filtered by their order status or a list of statuses
includes:
  - !include common.yaml
  - !include ../users/user_stage.yaml

#---------------------- NEUE TESTS START (User Stories) ----------------------
stages:
  - type: ref
  - id: create_user

  - #---------------------------Create Order---------------------------
  - #Create Order
  - name: Verify that status code equals 201 when we create a new order and the order is returned
  - request:
  - url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/order
  - method: POST
  - json:
    - user_id: "{user_id}"
    - address: &address
    - street: "{address_street:s}"
    - post_code: "{address_post_code:s}"
    - house_number: !int "{address_house_number:d}"
    - country: "{address_country:s}"
    - town: "{address_town:s}"
    - first_name: "{address_first_name:s}"
    - last_name: "{address_last_name:s}"
  - response:
    - status_code: 201
    - json:
    - order_datetime: !anything
    - id: !anything
    - user_id: !anything
    - address:
    - <<: *address
    - id: !anything
    - order_status: !anything
    - save:
      - json:
        - address_id: address.id
        - order_id: id
        - datetime: order_datetime
        - order_status: status


  - name: Filter orders by status OPEN
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/order
      method: GET
      params:
        statuses: "OPEN"
    response:
      status_code: 200
      json:
        id: "{order_id}"
        order_datetime: "{datetime}"
        user_id: "{user_id}"
        address:
          <<: *address
          id: "{address_id}"
        order_status: "OPEN"

  - name: Update order status to PREPARING
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/order/{order_id}/status
      method: PUT
      json:
        order_status: "PREPARING"
    response:
      status_code: 204


  - name: Filter orders by status PREPARING
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/order
      method: GET
      params:
        statuses: "PREPARING"
    response:
      status_code: 200
      json:
        id: "{order_id}"
        order_datetime: "{datetime}"
        user_id: "{user_id}"
        address:
          <<: *address
          id: "{address_id}"
        order_status: "OPEN"

  - name: Filter orders by multiple statuses
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/order
      method: GET
      params:
        statuses: ["OPEN", "PREPARING"]
    response:
      status_code: 200

#---------------------- NEUE TESTS ENDE ----------------------
  - name: Delete existing order and verify 204
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/order/{order_id}
      method: DELETE
    response:
      status_code: 204

  #Delete user
  - type: ref
    id: delete_user