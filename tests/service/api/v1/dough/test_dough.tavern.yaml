test_name: Make sure server implements crud functionality for dough endpoint

includes:
  - !include common.yaml

variables:
  dough_name: "Whole Grain {tavern.uid}"
  dough_price: 1.5
  dough_description: "Test Dough"
  dough_stock: 10
  # Unique name for the update test to avoid 303 errors
  new_dough_name: "Italian Style {tavern.uid}"

stages:
  - name: Verify that status code equals 201 when we create a new dough
    max_retries: 10
    delay_after: 2
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/doughs
      json: &dough
        name: "{dough_name:s}"
        price: !float "{dough_price:f}"
        description: "{dough_description}"
        stock: !int "{dough_stock:d}"
      method: POST
    response:
      status_code: 201
      json:
        <<: *dough
        id: !anything
      save:
        json:
          dough_id: id

  - name: Verify 303 when name already exists
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/doughs
      json:
        name: "{dough_name:s}"
        price: 9.99
        description: "My new dough"
        stock: 300
      method: POST
    response:
      status_code: 303

  - name: Get dough with id
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/doughs/{dough_id}
      method: GET
    response:
      status_code: 200
      json:
        <<: *dough
        id: "{dough_id}"

  - name: Check if a new dough is created when dough gets a new name
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/doughs/{dough_id}
      method: PUT
      json:
        <<: *dough
        name: "{new_dough_name:s}"
    response:
      status_code: 201
      json:
        <<: *dough
        id: !anything
        name: "{new_dough_name:s}"
      save:
        json:
          italian_id: id

  - name: Delete first created dough
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/doughs/{dough_id}
      method: DELETE
    response:
      status_code: 204

  - name: Delete second created dough
    request:
      url: http://{tavern.env_vars.API_SERVER}:{tavern.env_vars.API_PORT}/v1/doughs/{italian_id}
      method: DELETE
    response:
      status_code: 204